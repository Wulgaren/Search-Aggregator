# Optional: warm Netlify edge isolates on a schedule (no Brave/Google traffic).
#
# 1. Repo → Settings → Secrets → Actions → add KEEPALIVE_URL = https://YOUR-SITE.netlify.app
# 2. Enable this workflow (it no-ops until the secret is set).
#
# Or use any external cron (cron-job.org, UptimeRobot, etc.) with GET $KEEPALIVE_URL/api/ping

name: Edge keepalive

on:
  schedule:
    # Every 6 minutes — adjust if you prefer (GitHub minimum ~5 min for busy repos)
    - cron: "*/6 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/ping
        env:
          ORIGIN: ${{ secrets.KEEPALIVE_URL }}
        run: |
          if [ -z "$ORIGIN" ]; then
            echo "KEEPALIVE_URL not set — skipping (set repo secret to enable)"
            exit 0
          fi
          curl -fsS --max-time 30 "${ORIGIN%/}/api/ping"
