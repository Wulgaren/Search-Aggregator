[build]
  publish = "."
  command = "bun install --frozen-lockfile && bun run build"

# Edge: Brave, Marginalia, Wikipedia infobox, Brave images, Groq (/api/ai). Google uses the browser (popup).
[[edge_functions]]
  path = "/api/search"
  function = "search"

[[edge_functions]]
  path = "/api/ai"
  function = "search"

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=60, s-maxage=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=60, s-maxage=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/dict/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
